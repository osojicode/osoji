name: Security Scan

on:
  schedule:
    - cron: "0 6 * * 3"  # weekly on Wednesday (offset from Monday Scorecard)
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"
      - run: pip install "pip-audit==2.10.0"
      - run: pip install -e "."
      - name: Run pip-audit
        id: audit
        run: |
          set +e
          pip-audit 2>&1 | tee /tmp/audit.txt
          AUDIT_EXIT=$?
          set -e
          if [ $AUDIT_EXIT -ne 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create or update issue
        if: steps.audit.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          AUDIT_OUTPUT=$(cat /tmp/audit.txt)
          COMMIT_SHA=$(git rev-parse HEAD)
          DATE=$(date -u +%Y-%m-%d)

          EXISTING=$(gh issue list --label "security" --state open --search "Automated security scan" --json number --jq '.[0].number // empty')

          BODY=$(cat <<EOF
          ## Automated Security Scan — ${DATE}

          \`pip-audit\` found vulnerabilities at commit \`${COMMIT_SHA}\`.

          ### Findings

          \`\`\`
          ${AUDIT_OUTPUT}
          \`\`\`

          ### Next steps

          1. Check if the vulnerable package has a patched version
          2. Update \`pyproject.toml\` and regenerate \`requirements.lock\`
          3. If no patch exists, evaluate risk and pin to exclude the vulnerable range
          4. Run \`/security-incident <package>\` for a full incident response

          ---
          *Created by the [security-scan workflow](https://github.com/osojicode/osoji/actions/workflows/security-scan.yml).*
          EOF
          )

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create \
              --title "Automated security scan: vulnerabilities found (${DATE})" \
              --label "security" \
              --body "$BODY"
          fi
