name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install --require-hashes -r requirements-dev.lock
      - run: pip install -e "." --no-deps
      - run: pytest -m "not prompt_regression and not live_smoke"

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"
      # CI tooling (pip-audit, uv) installed with hash verification —
      # no unverified code runs in a context that has secret access.
      - run: pip install --require-hashes -r requirements-tools.lock
      # Audit both project lock files. Scoped to what we ship (runtime) and
      # what our CI executes (dev); excludes the runner's system pip and CI
      # tooling (hash-pinned above).
      #
      # Two separate invocations because the runtime and dev locks pin
      # different versions of shared transitive deps (dev extras change
      # resolution), so combining them into one pip-audit env triggers a
      # dependency conflict before any auditing happens.
      #
      # --ignore-vuln CVE-2026-28684 is a single, analyzed exception, NOT a
      # blanket suppression. The vuln is in python-dotenv.set_key() (a write
      # function for .env files). litellm 1.83.x exact-pins python-dotenv==1.0.1,
      # so we cannot upgrade python-dotenv without pinning away from the
      # safe litellm range (1.82.6 has 4 CVEs; 1.82.7/1.82.8 are compromised;
      # 1.83.0-1.83.6 has GHSA-xqmj-j6mv-4862). Neither osoji nor litellm
      # calls set_key() — verified by static search of both codebases — so
      # our attack surface for this vuln is effectively zero. Re-evaluate
      # when litellm relaxes the python-dotenv pin or publishes a version
      # against python-dotenv>=1.2.2. Tracked in SUPPLY-CHAIN-SECURITY.md.
      - name: Audit runtime dependencies
        run: pip-audit -r requirements.lock --ignore-vuln CVE-2026-28684
      - name: Audit dev dependencies
        run: pip-audit -r requirements-dev.lock --ignore-vuln CVE-2026-28684
      # Regenerate locks in place. `uv pip compile` uses the existing target
      # as a stability reference, so in-place regen is deterministic — any
      # change indicates the committed lock is out of sync with its source.
      - name: Verify requirements.lock is fresh (runtime deps)
        run: |
          uv pip compile pyproject.toml --generate-hashes --universal -o requirements.lock --quiet
          if ! git diff --quiet requirements.lock; then
            echo "::error::requirements.lock is out of sync with pyproject.toml"
            echo "Run: uv pip compile pyproject.toml --generate-hashes --universal -o requirements.lock"
            git diff requirements.lock | head -50
            exit 1
          fi
      - name: Verify requirements-dev.lock is fresh (runtime + dev deps)
        run: |
          uv pip compile pyproject.toml --extra dev --generate-hashes --universal -o requirements-dev.lock --quiet
          if ! git diff --quiet requirements-dev.lock; then
            echo "::error::requirements-dev.lock is out of sync with pyproject.toml"
            echo "Run: uv pip compile pyproject.toml --extra dev --generate-hashes --universal -o requirements-dev.lock"
            git diff requirements-dev.lock | head -50
            exit 1
          fi
      - name: Verify requirements-tools.lock is fresh (CI tooling)
        run: |
          uv pip compile requirements-tools.in --generate-hashes --universal -o requirements-tools.lock --quiet
          if ! git diff --quiet requirements-tools.lock; then
            echo "::error::requirements-tools.lock is out of sync with requirements-tools.in"
            echo "Run: uv pip compile requirements-tools.in --generate-hashes --universal -o requirements-tools.lock"
            git diff requirements-tools.lock | head -50
            exit 1
          fi
