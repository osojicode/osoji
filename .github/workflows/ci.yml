name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest -m "not prompt_regression and not live_smoke"

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.13"
      - run: pip install pip-audit
      - run: pip install -e "."
      - run: pip-audit
      - name: Verify lock file is up-to-date
        run: |
          pip install uv
          uv pip compile pyproject.toml --generate-hashes --universal -o /tmp/requirements.lock.check
          diff requirements.lock /tmp/requirements.lock.check || {
            echo "::error::requirements.lock is out of date. Run: uv pip compile pyproject.toml --generate-hashes --universal -o requirements.lock"
            exit 1
          }
