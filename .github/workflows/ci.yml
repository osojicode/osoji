name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest -m "not prompt_regression and not live_smoke"

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.13"
      - run: pip install "pip-audit==2.10.0"
      - run: pip install -e "."
      - run: pip-audit
      - name: Verify lock file covers direct dependencies
        run: |
          python -c "
          import tomllib, re, sys
          with open('pyproject.toml', 'rb') as f:
              deps = tomllib.load(f)['project']['dependencies']
          with open('requirements.lock') as f:
              lock = f.read().lower()
          missing = []
          for dep in deps:
              name = re.split('[><=!,;]', dep)[0].strip().lower()
              if name.replace('-', '-') not in lock and name.replace('-', '_') not in lock:
                  missing.append(dep)
          if missing:
              print('::error::requirements.lock is missing direct dependencies: ' + ', '.join(missing))
              print('Run: uv pip compile pyproject.toml --generate-hashes --universal -o requirements.lock')
              sys.exit(1)
          print(f'Lock file covers all {len(deps)} direct dependencies')
          "
