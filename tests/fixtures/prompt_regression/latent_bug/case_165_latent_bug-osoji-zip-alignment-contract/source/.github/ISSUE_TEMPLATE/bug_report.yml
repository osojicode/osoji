name: Bug Report
description: Report a bug in osoji
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Osoji version
      description: "Output of `osoji --version`"
      placeholder: "0.2.0"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      description: "Output of `python --version`"
      placeholder: "3.12.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true
  - type: input
    id: llm-provider
    attributes:
      label: LLM provider and model
      description: "e.g., Anthropic / claude-sonnet-4-20250514"
      placeholder: "Anthropic / claude-sonnet-4-20250514"
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: "Paste any relevant output (use `osoji -v` for verbose mode)."
      render: shell
