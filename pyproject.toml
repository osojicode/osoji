[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "docstar"
version = "0.1.0"
description = "Shadow documentation engine - generates semantically dense summaries of codebases for AI agent consumption"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [
    { name = "Docstar Authors" }
]
dependencies = [
    "anthropic>=0.39.0",
    "click>=8.1.0",
]

[project.scripts]
docstar = "docstar.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/docstar"]
